<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Truth or Dare Assistant</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6fb;
text-align:center;
}

header{
padding:20px;
font-size:24px;
font-weight:bold;
color:#2c5cc5;
}

.hero{
margin-top:80px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#555;
}

.boxes{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:250px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.box:hover{
transform:translateY(-5px);
}

.box h3{
margin-bottom:10px;
}

</style>

<!-- WotNot Chatbot Script -->
<script src="https://app.wotnot.io/chat-widget/Hvgmp5tgXXNT072052654761l3rZHuVQ.js" defer></script>

</head>

<body>

<header>
Truth or Dare Assistant
</header>

<div class="hero">

<h1>Your Fun Game Starts Here</h1>

<p>Open the chatbot in the bottom right corner and start playing Truth or Dare.</p>

</div>

<div class="boxes">

<div class="box">
<h3>Truth Questions</h3>
<p>Answer fun and interesting questions.</p>
</div>

<div class="box">
<h3>Dare Challenges</h3>
<p>Complete crazy challenges and have fun.</p>
</div>

<div class="box">
<h3>Play Again</h3>
<p>Keep playing and enjoy the chatbot game.</p>
</div>

</div>

</body>
</html>

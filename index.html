<!DOCTYPE html>
<html>

<head>
<title>Truth or Dare Assistant</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

h1{
color:#2c5cc5;
}

.hero{
margin-top:80px;
}

.hero h2{
font-size:45px;
}

.boxes{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:220px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

<!-- WotNot chatbot -->
<script src="https://app.wotnot.io/chat-widget/Hvgmp5tgXXNT072052654761l3rZHuVQ.js" defer></script>

</head>

<body>

<h1>Truth or Dare Assistant</h1>

<div class="hero">
<h2>Your Fun Game Starts Here</h2>
<p>Welcome! Use the chatbot in the bottom right corner to play Truth or Dare.</p>
</div>

<div class="boxes">

<div class="box">
<h3>Truth Questions</h3>
<p>Answer fun and interesting questions.</p>
</div>

<div class="box">
<h3>Dare Challenges</h3>
<p>Complete crazy challenges and have fun.</p>
</div>

<div class="box">
<h3>Play Again</h3>
<p>Keep playing and enjoy the chatbot game.</p>
</div>

</div>

</body>
</html>

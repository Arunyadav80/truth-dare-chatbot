<!DOCTYPE html>
<html>
<head>
<title>Truth or Dare Chatbot</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

header{
padding:20px;
font-size:24px;
font-weight:bold;
color:#2c5cc5;
}

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:50px;
color:#222;
}

.hero p{
font-size:18px;
color:#555;
}

.boxes{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
}

.box{
width:250px;
padding:25px;
border-radius:10px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}
</style>

</head>

<body>

<header>
Truth or Dare Assistant
</header>

<div class="hero">
<h1>Your Fun Game Starts Here</h1>
<p>Welcome! Use the chatbot in the bottom right corner to play Truth or Dare.</p>
</div>

<div class="boxes">

<div class="box">
<h3>Truth Questions</h3>
<p>Answer fun and interesting questions.</p>
</div>

<div class="box">
<h3>Dare Challenges</h3>
<p>Complete crazy challenges and have fun.</p>
</div>

<div class="box">
<h3>Play Again</h3>
<p>Keep playing and enjoy the chatbot game.</p>
</div>

</div>

<!-- WotNot chatbot script -->
<script src="https://app.wotnot.io/chat-widget/Hvgmp5tgXXNT07205265476113rZHuvQ.js" defer></script>

</body>
</html>
